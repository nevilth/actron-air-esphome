# I2C bus for MCP4725 DAC
i2c:
  sda: ${gpio_i2c_sda}
  scl: ${gpio_i2c_scl}
  frequency: 100kHz

mcp23017:
  - id: "mcp23017_hub"
    address: ${mcp23017_address}

globals:
  - id: prev_fan
    type: std::string
    initial_value: '"Unset"'
  - id: output_name
    type: std::string
    initial_value: '"Unset"'
  - id: output_id
    type: 'gpio::GPIOBinaryOutput*'
    restore_value: no

output:
  - platform: gpio
    id: reset_mcp23017
    pin:
      number: ${gpio_reset_pin}
      inverted: true
      mode:
        input: false
        output: true
  - platform: gpio
    id: Output_${name_power}_${pin_power}
    pin: 
      mcp23xxx: "mcp23017_hub"
      number: ${pin_power}
      inverted: true
      mode:
        input: false
        output: true
  - platform: gpio
    id: Output_${name_mode}_${pin_mode}
    pin:
      mcp23xxx: "mcp23017_hub"
      number: ${pin_mode}
      inverted: true
      mode: 
        input: false
        output: true
  - platform: gpio
