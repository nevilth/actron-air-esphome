# Button press timecontrol for testing
number:
  - platform: template
    name: "Button press time (ms)"
    id: button_set_time
    icon: mdi:timer
    mode: box
    min_value: 0
    max_value: 30000
    step: 50
    unit_of_measurement: "ms"
    initial_value: "250"
    optimistic: true
    restore_value: false
    disabled_by_default: true

# Button controls
button:
  - platform: template
    name: "Press"
    id: press_button
    internal: true
    icon: mdi:power
    on_press:
      - logger.log: 
          format: "Button %s Pressed"
          args: [id(output_name).c_str()]
          level: INFO
      - lambda: |-
          id(output_id)->turn_on();
      - delay: !lambda 'return id(button_set_time).state;'
      - lambda: |-
          id(output_id)->turn_off();
      - delay: 250ms

  - platform: template
    name: "Fan"
    icon: mdi:fan
    on_press:
      - lambda: |-
          id(output_id)=id(Output_${name_fan}_${pin_fan});
          id(output_name) = "${name_fan}";
          id(press_button).press();

  - platform: template
    name: "Mode"
    icon: mdi:air-conditioner
    on_press:
      - lambda: |-
          id(output_id)=id(Output_${name_mode}_${pin_mode});
          id(output_name) = "${name_mode}";
          id(press_button).press();

  - platform: template
    name: "Temp Up"
    icon: mdi:thermometer-plus
    on_press:
      - lambda: |-
          id(output_id)=id(Output_${name_temp_up}_${pin_temp_up});
          id(output_name) = "${name_temp_up}";
          id(press_button).press();

  - platform: template
    name: "Temp Down"
    icon: mdi:thermometer-minus
    on_press:
      - lambda: |-
          id(output_id)=id(Output_${name_temp_down}_${pin_temp_down});
          id(output_name) = "${name_temp_down}";
          id(press_button).press();

  - platform: template
    name: "Timer"
    icon: mdi:timer
    on_press:
      - lambda: |-
          id(output_id)=id(Output_${name_timer}_${pin_timer});
          id(output_name) = "${name_timer}";  
          id(press_button).press();

  - platform: template
    name: "Timer Up"
    icon: mdi:timer-plus
    on_press:
      - lambda: |-
          id(output_id)=id(Output_${name_timer_up}_${pin_timer_up});
          id(output_name) = "${name_timer_up}";
          id(press_button).press();

  - platform: template
    name: "Timer Down"
    icon: mdi:timer-minus
    on_press:
      - lambda: |-
          id(output_id)=id(Output_${name_timer_down}_${pin_timer_down});
          id(output_name) = "${name_timer_down}";
          id(press_button).press();

  - platform: restart
    name: "Restart"
    disabled_by_default: true

  - platform: shutdown
    name: "Shutdown"
    disabled_by_default: true

  - platform: safe_mode
    name: "Restart (Safe Mode)" 
    disabled_by_default: true
  
# Power and zone control switches
switch:
  - platform: template
    icon: mdi:power
    id: power
    name: "Power"
    restore_mode: DISABLED
    turn_on_action:
      - lambda: |-
          id(output_id)=id(Output_${name_power}_${pin_power});
          id(output_name) = "${name_power}";
          id(press_button).press();
    turn_off_action:
      - lambda: |-
          id(output_id)=id(Output_${name_power}_${pin_power});
          id(output_name) = "${name_power}";
          id(press_button).press();
    lambda: |-
      return (id(cool).state or id(auto_mode).state or id(heat).state or id(fan_cont).state or id(fan_high).state or id(fan_mid).state or id(fan_low).state);

  - platform: template
    id: zone_1_switch
    name: "Zone 1"
    icon: mdi:air-conditioner
    restore_mode: DISABLED
    turn_on_action:
      - lambda: |-
          id(output_id)=id(Output_${name_zone_1}_${pin_zone_1});
          id(output_name) = "${name_zone_1}";
          id(press_button).press();
    turn_off_action:
      - lambda: |-
          id(output_id)=id(Output_${name_zone_1}_${pin_zone_1});
          id(output_name) = "${name_zone_1}";
