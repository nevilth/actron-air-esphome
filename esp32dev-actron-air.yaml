actron_air_esphome:
  id: actron_air_esphome_1
  pin: ${gpio_status_pin}

# Sensors from keypad status component
sensor:
  - platform: actron_air_esphome
    setpoint_temp:
      name: "Setpoint Temperature"
      id: setpoint_temp
      icon: mdi:thermometer
    error_count:
      name: "Error Count"
      id: error_count
      icon: mdi:alert-circle
      disabled_by_default: true
    status_count:
      name: "Status Count"
      id: status_count
      icon: mdi:information-outline
      disabled_by_default: true
  
  - platform: sht4x
    precision: High
    heater_max_duty: 0
    temperature:
      name: "Temperature"
      accuracy_decimals: 1
      icon: mdi:home-thermometer
    humidity:
      name: "Humidity"
      icon: mdi:water-percent
      accuracy_decimals: 0
    update_interval: 60s
  
  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    disabled_by_default: true
    update_interval: 60s
    entity_category: "diagnostic"
  
  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    disabled_by_default: true
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""
   
text_sensor:
  - platform: actron_air_esphome
    bit_string:
      name: "Bit String"
      id: bit_string
      internal: true
    lcd_string:
      name: "LCD String"
      id: lcd_string

  - platform: template
    name: "Fan Mode"
    update_interval: 1s
    lambda: |-
      std::string current_fan = "";
      if(id(fan_high).state and id(fan_mid).state and id(fan_low).state) {
        current_fan="ESP";
      } else if (id(fan_mid).state and !id(fan_cont).state) {
        current_fan="Medium";
      } else if (id(fan_low).state and !id(fan_cont).state) {
        current_fan="Low";
      } else if (id(fan_high).state and id(fan_cont).state) {
        current_fan="High Cont";
      } else if (id(fan_mid).state and id(fan_cont).state) {
        current_fan="Medium Cont";
      } else if (id(fan_low).state and id(fan_cont).state) {
        current_fan="Low Cont";
      } else {
        current_fan="Off";
      }
      if (current_fan.compare(id(prev_fan)) != 0) {
        id(prev_fan) = current_fan;
        return {current_fan};
      }
      return {};

  - platform: wifi_info
    ip_address:
      name: IP Address
      disabled_by_default: true
    ssid:
      name: Connected SSID
      disabled_by_default: true
    mac_address:
      name: MAC Address
      disabled_by_default: true
    scan_results:
      disabled_by_default: true
      name: Scan Results
    dns_address:
      disabled_by_default: true
      name: DNS Address
    power_save_mode:
      disabled_by_default: true
      name: Wifi Power Save Mode  
  
  - platform: uptime
    name: Uptime
    disabled_by_default: true
    format:
      separator: " "
      days: "D"
  
  - platform: version
    name: "ESPHome Version"
    disabled_by_default: true

binary_sensor:
