# ESPHome Package for Actron Air Keypad
# Include this package in your ESPHome configuration and provide your own
# esphome name, wifi credentials, and optionally override any substitutions.
#
# Usage:
#   packages:
#     actron_air: github://nevilth/actron-air-esphome/esp32dev-actron-air.yaml@main
#
# All substitutions below can be overridden in your configuration.

substitutions:
 
  esphome_name: "esp32dev-actron-keypad" # name for the ESP32 device
  esphome_friendly_name: "Actron Keypad"
  area: "Hallway"

  esp32_variant: "esp32c3"
  encryption_key: ""

  # GPIO Configuration
  gpio_status_pin: "GPIO0"     # Pin for the status signal (from power line)
  gpio_i2c_sda: "GPIO10"       # I2C SDA pin
  gpio_i2c_scl: "GPIO3"        # I2C SCL pin
  gpio_reset_pin: "GPIO1"      # Pin to reset the mcp23017 (if needed)

  # MCP23017 I2C address (default 0x20, change if you have other I2C devices or a different address)
  mcp23017_address: "0x20"
  
  # pin numbers values for button presses
  pin_power: "15"
  pin_mode: "14"
  pin_fan: "13"
  pin_temp_up: "12"
  pin_temp_down: "11"
  pin_timer: "10"
  pin_timer_up: "9"
  pin_timer_down: "8"

  # Zone pin numbers 
  pin_zone_1: "7"
  pin_zone_2: "6"
  pin_zone_3: "5"
  pin_zone_4: "4"
  pin_zone_5: "3"
  pin_zone_6: "2"
  pin_zone_7: "1"
  pin_zone_8: "0"

# Names for button presses
  name_power: "Power"
  name_mode: "Mode"
  name_fan: "Fan"
  name_temp_up: "Temp_Up"
  name_temp_down: "Temp_Down"
  name_timer: "Timer"
  name_timer_up: "Timer_Up"
  name_timer_down: "Timer_Down"

  # Names for Zones  
  name_zone_1: "Zone_1"
  name_zone_2: "Zone_2"
  name_zone_3: "Zone_3"
  name_zone_4: "Zone_4"
  name_zone_5: "Zone_5"
  name_zone_6: "Zone_6"
  name_zone_7: "Zone_7"
  name_zone_8: "Zone_8"

#switch:
#  - id: !remove zone_6_switch
#  - id: !remove zone_7_switch
#  - id: !remove zone_8_switch

#  - id: !remove zone_6
#  - id: !remove zone_7
#  - id: !remove zone_8  

esphome:
  name: "${esphome_name}"
  friendly_name: "${esphome_friendly_name}"
  comment: "ESPHome configuration for AirCon Keypad"
  area: "${area}"
  min_version: 2025.11.0
  name_add_mac_suffix: false
  on_boot:
    - priority: 1200
      then:
        - lambda: |-
            // Reset MCP23017 on boot to ensure known state (if reset pin is connected)
            id(reset_mcp23017)->turn_on();
            delay(100); // Hold for 100ms
            id(reset_mcp23017)->turn_off();
            delay(100); // Wait for MCP23017 to initialize
    - priority: 600 # Wait for components to initialize before running boot sequence
      then:
        - output.turn_off: Output_${name_power}_${pin_power} # Ensure power is off on boot
        - output.turn_off: Output_${name_mode}_${pin_mode} # Ensure mode is off on boot
        - output.turn_off: Output_${name_fan}_${pin_fan} # Ensure fan is off on boot
        - output.turn_off: Output_${name_temp_up}_${pin_temp_up} # Ensure temp up is off on boot
        - output.turn_off: Output_${name_temp_down}_${pin_temp_down} # Ensure temp down is off on boot
        - output.turn_off: Output_${name_timer}_${pin_timer} # Ensure timer is off on boot
        - output.turn_off: Output_${name_timer_up}_${pin_timer_up} # Ensure timer up is off on boot
        - output.turn_off: Output_${name_timer_down}_${pin_timer_down} # Ensure timer down is off on boot
        - output.turn_off: Output_${name_zone_1}_${pin_zone_1} # Ensure zone 1 is off on boot
        - output.turn_off: Output_${name_zone_2}_${pin_zone_2} # Ensure zone 2 is off on boot
        - output.turn_off: Output_${name_zone_3}_${pin_zone_3} # Ensure zone 3 is off on boot
        - output.turn_off: Output_${name_zone_4}_${pin_zone_4} # Ensure zone 4 is off on boot
        - output.turn_off: Output_${name_zone_5}_${pin_zone_5} # Ensure zone 5 is off on boot
        - output.turn_off: Output_${name_zone_6}_${pin_zone_6} # Ensure zone 6 is off on boot
        - output.turn_off: Output_${name_zone_7}_${pin_zone_7} # Ensure zone 7 is off on boot
        - output.turn_off: Output_${name_zone_8}_${pin_zone_8} # Ensure zone 8 is off on boot
        - output.turn_off: reset_mcp23017 # Ensure reset pin is off (high) on boot
      
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 8.5dB
  enable_btm: True
  enable_rrm: True
  post_connect_roaming: True
  
  ap:
    ssid: "${esphome_name}_Hotspot"
 
esp32:
  variant: ${esp32_variant}
  framework:
    type: esp-idf

logger:
#  baud_rate: 0 # Disable logging over UART
  level: DEBUG

api:
  encryption:
    key: ${encryption_key}

ota:
  - platform: esphome

# Enable auto-discovery in Home Assistant
mdns:
  services:
    - service: "_actron_air"
      protocol: "_tcp"
      port: 6053
      txt:
        version: "1.0.0"
        name: "my-aircon"

